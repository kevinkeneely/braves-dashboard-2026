<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Wordmark gradient: blue (BRAVES) → magenta/red (TRACKER) -->
    <linearGradient id="tGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4A6FBF"/>
      <stop offset="50%"  stop-color="#8B4A9E"/>
      <stop offset="100%" stop-color="#C4285E"/>
    </linearGradient>
    <!-- Gold outline stroke around the T (matches wordmark) -->
    <linearGradient id="tStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#C4A35A"/>
      <stop offset="100%" stop-color="#E8C77A"/>
    </linearGradient>
  </defs>

  <!-- Dark navy background -->
  <rect width="64" height="64" fill="#0a1530" rx="8"/>

  <!-- Subtle line-chart pattern behind the T -->
  <g opacity="0.35" stroke-width="1" fill="none" stroke-linecap="round">
    <polyline points="0,42 10,38 20,44 30,36 40,40 50,30 64,34" stroke="#4A6FBF"/>
    <polyline points="0,50 10,46 20,48 30,42 40,46 50,40 64,42" stroke="#C4285E"/>
    <polyline points="0,54 10,52 20,50 30,52 40,48 50,50 64,46" stroke="#8B4A9E"/>
    <polyline points="0,36 10,32 20,34 30,28 40,30 50,24 64,26" stroke="#C4A35A"/>
  </g>
  <!-- Dots on the line chart -->
  <g opacity="0.5">
    <circle cx="10" cy="38" r="1.2" fill="#4A6FBF"/>
    <circle cx="30" cy="36" r="1.2" fill="#4A6FBF"/>
    <circle cx="50" cy="30" r="1.2" fill="#4A6FBF"/>
    <circle cx="20" cy="48" r="1.2" fill="#C4285E"/>
    <circle cx="40" cy="46" r="1.2" fill="#C4285E"/>
    <circle cx="10" cy="32" r="1.2" fill="#C4A35A"/>
    <circle cx="30" cy="28" r="1.2" fill="#C4A35A"/>
    <circle cx="50" cy="24" r="1.2" fill="#C4A35A"/>
  </g>

  <!-- The "T" — serif style matching Cinzel/wordmark aesthetic -->
  <g>
    <!-- Top bar of the T -->
    <rect x="12" y="14" width="40" height="8" fill="url(#tGrad)" stroke="url(#tStroke)" stroke-width="1"/>
    <!-- Vertical stem of the T -->
    <rect x="26" y="14" width="12" height="38" fill="url(#tGrad)" stroke="url(#tStroke)" stroke-width="1"/>
    <!-- Serif feet at bottom -->
    <rect x="20" y="46" width="24" height="6" fill="url(#tGrad)" stroke="url(#tStroke)" stroke-width="1"/>
  </g>
</svg>
